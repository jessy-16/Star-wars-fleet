@if (loading) {
  <div class="loader-screen">
    <div class="loader-content">

      <h1>Initializing Starfleet...</h1>

      <div class="progress-container">
        <div class="progress-bar" [style.width.%]="progress"></div>
      </div>

      <p>{{ progress }}%</p>

    </div>
  </div>
} @else {
  <app-fleet></app-fleet>
}
